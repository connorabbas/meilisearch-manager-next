services:
  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: meilisearch-manager
    hostname: meilisearch-manager
    entrypoint: /bin/bash
    working_dir: /workspace
    environment:
      NUXT_SECURE_MODE: 'true'
      NUXT_APP_BASE_URL: /manager/
      NUXT_MEILISEARCH_HOST: http://meilisearch:7700
      NUXT_MEILISEARCH_API_KEY: '${MEILISEARCH_MASTER_KEY:-masterKey}'
    extra_hosts:
      - 'meilisearch-manager.localhost:host-gateway'
    volumes:
      - '.:/workspace'
    tty: true
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.meilisearch-manager.rule=Host(`meilisearch-manager.localhost`) && PathPrefix(`/manager`)'
      - 'traefik.http.services.meilisearch-manager.loadbalancer.server.port=${NUXT_APP_PORT:-3000}'
    networks:
      - proxy
      - web

  meilisearch:
    image: 'getmeili/meilisearch:latest'
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-true}'
      MEILI_MASTER_KEY: '${MEILISEARCH_MASTER_KEY:-masterKey}'
      MEILI_ENV: development
    volumes:
      - 'meilisearch-data:/meili_data'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.meilisearch-manager-instance.rule=Host(`meilisearch-manager.localhost`) && PathPrefix(`/search`)'
      - 'traefik.http.routers.meilisearch-manager-instance.middlewares=meilisearch-manager-instance-strip-prefix'
      - 'traefik.http.middlewares.meilisearch-manager-instance-strip-prefix.stripprefix.prefixes=/search'
      - 'traefik.http.services.meilisearch-manager-instance.loadbalancer.server.port=7700'
    networks:
      - proxy
      - web
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--spider'
        - 'http://127.0.0.1:7700/health'
      retries: 3
      timeout: 5s

volumes:
  meilisearch-data:

networks:
  web:
  proxy: # setup in separate compose file
    name: 'traefik_proxy'
    external: true
