services:
  nuxt:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: meilisearch-manager
    hostname: meilisearch-manager
    entrypoint: /bin/bash
    working_dir: /workspace
    volumes:
      - '.:/workspace'
    tty: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meilisearch-manager.rule=Host(`meilisearch-manager.localhost`)"
      - "traefik.http.services.meilisearch-manager.loadbalancer.server.port=${NUXT_APP_PORT:-3000}"
    networks:
      - proxy
      - web

  meilisearch:
    image: 'getmeili/meilisearch:latest'
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-true}'
      MEILI_MASTER_KEY: '${MEILISEARCH_MASTER_KEY:-masterKey}'
      MEILI_ENV: development
    volumes:
      - 'meilisearch-data:/meili_data'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meilisearch-manager-instance.rule=Host(`instance.meilisearch-manager.localhost`)"
      - "traefik.http.services.meilisearch-manager-instance.loadbalancer.server.port=7700"
    networks:
      - proxy
      - web
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--spider'
        - 'http://127.0.0.1:7700/health'
      retries: 3
      timeout: 5s

volumes:
  meilisearch-data:

networks:
  web:
  proxy: # setup in separate compose file
    name: "traefik_proxy"
    external: true
